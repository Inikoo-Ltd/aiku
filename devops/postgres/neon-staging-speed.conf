# Speed-over-durability tuning for neon (staging + test box, 64GB RAM, 16 cores,
# 4x HDD RAID10). Data here is disposable: aiku_staging reloads weekly from prod
# (refresh-staging.sh) and aiku_test* are regenerated per CI run.
#
# THE TRADE: fsync/full_page_writes off means an OS crash or power loss can
# corrupt the cluster -> re-run the restore from the dump. Never use on prod.
# Place at /etc/postgresql/18/main/conf.d/99-neon-speed.conf

# --- durability off (crash = rebuild from dump) ---
fsync = off
synchronous_commit = off
full_page_writes = off

# --- minimal WAL: no replicas/PITR on this box; bulk loads can skip WAL (restart required) ---
wal_level = minimal
max_wal_senders = 0

# --- fewer, smoother checkpoints (big HDD win) ---
checkpoint_timeout = 30min
max_wal_size = 16GB
min_wal_size = 2GB
checkpoint_completion_target = 0.9
wal_buffers = 64MB

# --- memory (restart required for shared_buffers) ---
shared_buffers = 16GB
effective_cache_size = 48GB
work_mem = 64MB
maintenance_work_mem = 2GB
max_parallel_maintenance_workers = 4

# --- HDD-appropriate planner/IO ---
# random_page_cost stays at default 4 (correct for spinning disks; 1.1 is an SSD setting)
effective_io_concurrency = 4
