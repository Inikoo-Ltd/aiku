;etc/supervisor/conf.d/aiku-staging-horizon.conf
[program:horizon]
process_name=%(program_name)s
command=/usr/bin/php8.4 /home/staging/aiku/current/artisan horizon
autostart=true
autorestart=true
user=staging
redirect_stderr=true
stdout_logfile=/home/staging/logs/supervisor-staging-horizon.log
stopwaitsecs=3600
