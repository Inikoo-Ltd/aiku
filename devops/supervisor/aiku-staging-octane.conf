;etc/supervisor/conf.d/aiku-staging-octane.conf
[program:octane]
process_name=%(program_name)s
command=/usr/bin/php8.4 /home/staging/aiku/anchor/octane/artisan octane:start -q --workers=8 --max-requests=400
autostart=true
autorestart=true
user=staging
redirect_stderr=true
stdout_logfile=/home/staging/logs/supervisor-staging-octane.log
stopwaitsecs=3600
