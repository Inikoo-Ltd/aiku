global
	log /dev/log	local0
	log /dev/log	local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

	# Default SSL material locations
	ca-base /etc/ssl/certs
	crt-base /etc/ssl/private

	# See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
        ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
        ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
        ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
	log	global
	mode	http
	option	httplog
	option	dontlognull
        timeout connect 5000
        timeout client  50000
        timeout server  50000
	errorfile 400 /etc/haproxy/errors/400.http
	errorfile 403 /etc/haproxy/errors/403.http
	errorfile 408 /etc/haproxy/errors/408.http
	errorfile 500 /etc/haproxy/errors/500.http
	errorfile 502 /etc/haproxy/errors/502.http
	errorfile 503 /etc/haproxy/errors/503.http
	errorfile 504 /etc/haproxy/errors/504.http

    # Common X-Forwarded-For handling for all HTTP proxies
    option  forwardfor           # preferred, adds/updates X-Forwarded-For safely
    # If you truly need a custom header rule instead of the option, you can use:
    # http-request set-header X-Forwarded-For %[src]


# Enable HAProxy Statistics
listen stats
    bind *:8880
    stats enable
    stats uri /
    stats realm Haproxy\ Statistics
    stats auth {{HAPROXY_STATS_USER}}:{{HAPROXY_STATS_PASSWORD}}
    stats refresh 60s


frontend aiku
    bind *:80

    # --- CLOUDFLARE REAL IP LOGIC START ---
    # Ensure /path/to/CF_ips.lst exists and contains Cloudflare's IP ranges
    acl from_cf src -f /etc/haproxy/CF_ips.lst
    acl cf_ip_hdr req.hdr(CF-Connecting-IP) -m found

    # Overwrite X-Forwarded-For with the real IP if the request is from Cloudflare
    http-request set-header X-Forwarded-For %[req.hdr(CF-Connecting-IP)] if from_cf cf_ip_hdr
    # --- CLOUDFLARE REAL IP LOGIC END ---

    http-request set-src hdr_ip(CF-Connecting-IP) if from_cf

    acl has_query query -m found
    http-request redirect code 301 location %[path,regsub(basket\.sys$,app/basket)]?%[query] if { path_end basket.sys } has_query
    http-request redirect code 301 location %[path,regsub(basket\.sys$,app/basket)] if { path_end basket.sys } !has_query

    # Deny any request targeting a PHP file (case-insensitive), regardless of path; returns 422
    # Exception: allow /unsubscribe.php to pass (handled below)
    acl deny_php path_reg -i \.php(\?.*)?$
    acl deny_php path_reg -i \.(config|cfg|conf|ini|yml|yaml|log|sh|bash|pl|py|sql|git|svn|bak|backup|old|one|~|htaccess|htpasswd|ashx|asp|aspx|jsp|exe|bat|cmd|ps1|dll|so|dylib|lock|sys)$
    acl deny_php path_sub -i zb_users

    acl deny_php path_beg -i /wp-admin /wp-content /wp-includes /wp-json /statics /readme.html /license.txt /trackback/ /phpmyadmin /config/ /server/ /admin/ /core/ /api/keys/ /system/ /bower_components /laravel /aws/s3

    acl sensitive_hidden path_reg -i (^|/)\.(env|git|svn|hg)([./-]|$)
    acl sensitive_backup path_reg -i (\.bak|\.old|\.save|\.swp|~)$
    acl sensitive_tools path_reg -i (^|/)(artisan|composer\.(json|lock))$

    http-request deny deny_status 403 if sensitive_hidden
    http-request deny deny_status 403 if sensitive_backup
    http-request deny deny_status 403 if sensitive_tools


    acl is_not_found path_reg -i ads\.txt$
    acl is_not_found path_reg -i meta\.json$

    acl is_not_found path_reg -i ^/?rwi/[0-9]+x[0-9]+_[0-9]+\.jpeg$
    http-request deny deny_status 404 if is_not_found    


    acl facebook_bot hdr_reg(User-Agent) -i (facebookexternalhit|meta-externalagent|meta-externalfetcher|facebookcatalog|meta-webindexer)
    acl meta_ip src -f /etc/haproxy/facebook-bots.lst

    http-request deny deny_status 403 if facebook_bot
    http-request deny deny_status 403 if meta_ip

    acl allow_unsubscribe_php path_beg -i /unsubscribe.php
    http-request deny deny_status 422 if deny_php !allow_unsubscribe_php
    #http-request deny if facebook_bot


    http-request redirect prefix http://www.awartisan.eu code 301 if { hdr(host) -i awartisan.eu }
    http-request redirect prefix http://www.awartisan.pt code 301 if { hdr(host) -i awartisan.pt }
    http-request redirect prefix http://www.awartisan.de code 301 if { hdr(host) -i awartisan.de }
    http-request redirect prefix http://www.awartisan.fr code 301 if { hdr(host) -i awartisan.fr }
    http-request redirect prefix http://www.awartisan.es code 301 if { hdr(host) -i awartisan.es }

    acl is_canary hdr_beg(host) -i canary.
    acl is_sandbox hdr(host),lower,field(1,:) -m end aiku-sandbox.uk
    use_backend staging if is_canary or is_sandbox

    acl is_litio path_beg /devops/server/litio
    use_backend litio if is_litio
    acl is_helio path_beg /devops/server/helio
    use_backend helio if is_helio
    acl is_boro path_beg /devops/server/boro
    use_backend http_back if is_boro

    # Matches aiku.io and any subdomain, ignoring a port if present
    acl is_aiku hdr(host),lower,field(1,:) -m end aiku.io
    use_backend http_back if is_aiku
    

    # Serve static assets directly from app servers (bypass Varnish)
    acl is_static path_reg -i \.(7z|avi|avif|bmp|bz2|css|csv|doc|docx|eot|flac|flv|gif|gz|ico|jpeg|jpg|js|mjs|map|less|mka|mkv|mov|mp3|mp4|mpeg|mpg|odt|otf|ogg|ogm|opus|pdf|png|ppt|pptx|rar|rtf|svg|svgz|swf|tar|tbz|tgz|ttf|txt|txz|wav|webm|webp|woff|woff2|xls|xlsx|xml|xz|zip)(\?.*)?$
    use_backend http_back if is_static

    # Route Echo/Laravel broadcasting auth directly to app backend (bypass Varnish)
    acl is_broadcast_auth path_beg -i /broadcasting/auth
    use_backend http_back if is_broadcast_auth

    # Route selected app paths directly to app backend (bypass Varnish)
    acl is_direct_app_paths path_beg -i /app /json /search /disclosure /unsubscribe /unsubscribe.php /locale /models /catalogue /invoice /attachment /webhooks
    use_backend http_back if is_direct_app_paths


    acl is_not_get method !GET
    use_backend http_back if is_not_get 

    acl is_v2_subdomain hdr(host) -m beg v2.
    use_backend varnish_helio  if is_v2_subdomain



#    default_backend http_back
    default_backend varnish
		


backend http_back
    # Load Balance Method (roundrobin, leastconn, source, random)
    balance leastconn

    # Persistence Connection
    # stick-table type ip size 1m expire 30m
    # stick on src

    # Remove Header Server
    http-response del-header Server

    # Health Check
    option httpchk
    http-check send meth HEAD uri / ver HTTP/1.1 hdr Host localhost
    #option http-server-close
    #option http-keep-alive
    option http-keep-alive
    http-reuse safe

    # Backend server pool
    server boro 10.0.0.3:8080 check maxconn 2500


backend varnish
    server boro 10.0.0.3:6081

backend varnish_helio
    server helio 10.0.0.2:6081

backend staging
    server torio 89.167.114.206:8080

backend  boro
    server boro 10.0.0.3:8080
backend  helio
    server helio 10.0.0.2:8080
backend  litio
    server litio 10.0.0.1:8080

